# Local/linked CLI configuration. This file contains no remote credentials.
project_id = "sacred-circle"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.migrations]
enabled = true
schema_paths = []

[db.seed]
# Production seed execution is always an explicit deployment decision.
enabled = false
sql_paths = ["./seed.sql"]

[auth]
enabled = true
site_url = "https://sacred-circle-app.vercel.app"
additional_redirect_urls = ["https://sacred-circle-app.vercel.app/**", "https://admin-lemon-sigma.vercel.app/**", "https://*-namanag9315s-projects.vercel.app/**", "http://localhost:8081/**", "http://localhost:8082/**", "http://127.0.0.1:8081/**", "http://127.0.0.1:8082/**", "http://127.0.0.1:3000/**", "sacredcircle://auth/callback"]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = false
enable_confirmations = true
secure_password_change = false
max_frequency = "1m0s"
otp_length = 8
otp_expiry = 3600

[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.mfa.phone]
enroll_enabled = false
verify_enabled = false

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.vector]
enabled = false
max_buckets = 10
max_indexes = 5

[edge_runtime]
enabled = true
policy = "per_worker"
inspector_port = 8083

[functions.get-resource-url]
verify_jwt = false

[functions.create-upload-url]
verify_jwt = true

[functions.delete-account]
verify_jwt = true
